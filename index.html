<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Bulk Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-entry { font-family: monospace; font-size: 0.9rem; }
        .valid { color: #10b981; }
        .invalid { color: #ef4444; }
        .error { color: #f59e0b; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">MLBB Bulk Account Checker</h1>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Combolist (email:password per baris)</label>
                <textarea id="combolist" rows="8" class="w-full p-3 border rounded font-mono text-sm" placeholder="email1:pass1&#10;email2:pass2"></textarea>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Delay (ms)</label>
                    <input type="number" id="delay" value="2000" min="100" step="100" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Threads (concurrency)</label>
                    <input type="number" id="threads" value="3" min="1" max="10" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Proxy (opsional, satu per baris)</label>
                    <textarea id="proxies" rows="2" class="w-full p-2 border rounded text-sm" placeholder="http://user:pass@host:port"></textarea>
                </div>
            </div>
            
            <div class="flex space-x-4">
                <button id="startBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition">
                    Start Checking
                </button>
                <button id="stopBtn" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded transition" disabled>
                    Stop
                </button>
                <button id="exportBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded transition" disabled>
                    Export Results
                </button>
            </div>
        </div>
        
        <!-- Status & Logs -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Live Logs</h2>
                <div class="text-sm">
                    <span class="mr-4"><span class="inline-block w-3 h-3 rounded-full bg-green-500 mr-1"></span> Valid: <span id="validCount">0</span></span>
                    <span class="mr-4"><span class="inline-block w-3 h-3 rounded-full bg-red-500 mr-1"></span> Invalid: <span id="invalidCount">0</span></span>
                    <span class="mr-4"><span class="inline-block w-3 h-3 rounded-full bg-yellow-500 mr-1"></span> Error: <span id="errorCount">0</span></span>
                    <span>Total: <span id="totalCount">0</span></span>
                </div>
            </div>
            <div id="logContainer" class="bg-gray-900 text-gray-200 p-4 rounded h-96 overflow-y-auto font-mono text-sm">
                <!-- Logs akan ditambahkan di sini -->
            </div>
        </div>
    </div>
    
    <script>
        let checking = false;
        let results = [];
        let currentRequestId = null;
        let pollInterval = null;
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const exportBtn = document.getElementById('exportBtn');
        const logContainer = document.getElementById('logContainer');
        
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            let color = 'text-gray-300';
            if (type === 'valid') color = 'text-green-400';
            else if (type === 'invalid') color = 'text-red-400';
            else if (type === 'error') color = 'text-yellow-400';
            entry.innerHTML = `<span class="${color}">[${new Date().toLocaleTimeString()}] ${message}</span>`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function updateCounts() {
            const valid = results.filter(r => r.status === 'VALID').length;
            const invalid = results.filter(r => r.status === 'INVALID').length;
            const error = results.filter(r => r.status === 'ERROR').length;
            document.getElementById('validCount').innerText = valid;
            document.getElementById('invalidCount').innerText = invalid;
            document.getElementById('errorCount').innerText = error;
            document.getElementById('totalCount').innerText = results.length;
        }
        
        async function startChecking() {
            const combolist = document.getElementById('combolist').value.trim();
            if (!combolist) {
                alert('Masukkan combolist terlebih dahulu!');
                return;
            }
            
            const delay = parseInt(document.getElementById('delay').value);
            const threads = parseInt(document.getElementById('threads').value);
            const proxiesText = document.getElementById('proxies').value.trim();
            const proxies = proxiesText ? proxiesText.split('\n').map(p => p.trim()).filter(p => p) : [];
            
            checking = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            exportBtn.disabled = true;
            logContainer.innerHTML = '';
            results = [];
            updateCounts();
            
            addLog('Memulai pengecekan...', 'info');
            
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        combolist,
                        delay,
                        threads,
                        proxies
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server error (${response.status}): ${errorText.substring(0, 100)}`);
                }
                
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    throw new Error(`Expected JSON but got: ${text.substring(0, 100)}`);
                }
                
                const data = await response.json();
                if (data.requestId) {
                    currentRequestId = data.requestId;
                    addLog(`Request ID: ${currentRequestId}`, 'info');
                    pollResults(currentRequestId);
                } else {
                    addLog(`Error: ${data.error}`, 'error');
                    resetUI();
                }
            } catch (error) {
                addLog(`Gagal menghubungi server: ${error.message}`, 'error');
                resetUI();
            }
        }
        
        async function pollResults(requestId) {
            pollInterval = setInterval(async () => {
                if (!checking) {
                    clearInterval(pollInterval);
                    return;
                }
                
                try {
                    const res = await fetch(`/api/check?requestId=${requestId}`);
                    if (!res.ok) {
                        throw new Error(`Polling error ${res.status}`);
                    }
                    const data = await res.json();
                    
                    if (data.completed) {
                        clearInterval(pollInterval);
                        addLog('Pengecekan selesai!', 'info');
                        results = data.results || [];
                        updateCounts();
                        resetUI(true);
                    } else if (data.results && data.results.length > 0) {
                        data.results.forEach(result => {
                            if (!results.some(r => r.email === result.email)) {
                                results.push(result);
                                let logMsg = `${result.email} : ${result.status}`;
                                if (result.status === 'VALID') {
                                    logMsg += ` - Token: ${result.token?.substring(0, 20)}...`;
                                    addLog(logMsg, 'valid');
                                } else if (result.status === 'INVALID') {
                                    addLog(logMsg, 'invalid');
                                } else {
                                    addLog(logMsg, 'error');
                                }
                            }
                        });
                        updateCounts();
                    }
                    
                    if (data.error) {
                        addLog(`Server error: ${data.error}`, 'error');
                    }
                    
                } catch (err) {
                    addLog(`Polling error: ${err.message}`, 'error');
                }
            }, 2000);
        }
        
        function stopChecking() {
            if (currentRequestId) {
                fetch(`/api/check?requestId=${currentRequestId}`, { method: 'DELETE' })
                    .catch(err => console.error('Gagal menghentikan proses:', err));
            }
            checking = false;
            clearInterval(pollInterval);
            addLog('Pengecekan dihentikan oleh user.', 'error');
            resetUI();
        }
        
        function resetUI(enableExport = false) {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            if (enableExport) exportBtn.disabled = false;
            checking = false;
            currentRequestId = null;
        }
        
        function exportResults() {
            if (results.length === 0) {
                alert('Tidak ada hasil untuk diekspor.');
                return;
            }
            
            const dataStr = JSON.stringify(results, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mlbb_results_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        startBtn.addEventListener('click', startChecking);
        stopBtn.addEventListener('click', stopChecking);
        exportBtn.addEventListener('click', exportResults);
    </script>
</body>
  </html>
